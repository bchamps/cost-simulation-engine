<!-- 
  ===================================================================================
  COST SIMULATION ENGINE – DETAILED P&L VIEW
  ===================================================================================
  Repository: cost-simulation-engine
  File: DetailedDRE.html
  Description: SPA view exposing granular line-item breakdowns (G&A, Selling 
               Expenses, etc.). Implements client-side proportional cascading math 
               to distribute macro-scenario variances into micro-level sub-accounts.
  =================================================================================== 
-->

<div id="detailed-view" class="view-section space-y-6 animate-fadeIn">

  <!-- 1. EXECUTIVE TOOLBAR -->
  <div class="bg-[#fafaf9] border border-[#e5e5e5] rounded-lg p-3 shadow-sm flex flex-wrap items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <!-- Slate Blue indicator -->
      <span class="w-2.5 h-2.5 rounded-sm bg-[#5c6b89]"></span>
      <h1 class="text-sm font-bold uppercase tracking-widest text-[#333333]">Detailed P&L Drill-down</h1>
    </div>

    <div class="flex flex-wrap items-center gap-3 text-xs">
      <div class="flex items-center gap-2 bg-white border border-[#e5e5e5] rounded px-3 py-1.5 shadow-sm transition-colors hover:border-[#5c6b89]">
        <span class="text-[#8c8c8c] font-medium">Scenario:</span>
        <select id="detail-scenario" onchange="DetailedController.loadData()" class="bg-transparent font-bold text-[#333333] focus:outline-none cursor-pointer">
          <option value="base">Baseline (Actuals)</option>
          <option value="scenario_A">Scenario A (Optimized)</option>
        </select>
      </div>

      <div class="flex items-center gap-2 bg-white border border-[#e5e5e5] rounded px-3 py-1.5 shadow-sm transition-colors hover:border-[#5c6b89]">
        <span class="text-[#8c8c8c] font-medium">Year:</span>
        <select id="detail-year" onchange="DetailedController.loadData()" class="bg-transparent font-bold text-[#333333] focus:outline-none cursor-pointer font-mono">
          <option value="2026" selected>2026</option>
          <option value="2025">2025</option>
        </select>
      </div>

      <div class="flex items-center gap-2 bg-white border border-[#e5e5e5] rounded px-3 py-1.5 shadow-sm transition-colors hover:border-[#5c6b89]">
        <span class="text-[#8c8c8c] font-medium">POS:</span>
        <select id="detail-pos" onchange="DetailedController.loadData()" class="bg-transparent font-bold text-[#333333] focus:outline-none cursor-pointer font-mono">
          <option value="ALL">All Units</option>
          <option value="POS_0001">POS_0001</option>
        </select>
      </div>
    </div>
  </div>

  <!-- 2. DATA GRID: PROPORTIONAL VARIANCE TABLE -->
  <div class="kpi-card bg-white border border-[#e5e5e5] rounded-lg shadow-sm">
    <div class="p-4 border-b border-[#f0f0f0] bg-[#fafaf9] rounded-t-lg flex justify-between items-end">
      <div>
        <h2 class="text-xs font-bold uppercase tracking-wider text-[#595959]">Granular Variance Analysis</h2>
        <p class="text-[11px] text-[#8c8c8c] mt-1">Cascading impact of simulated macro-levers applied to underlying sub-accounts.</p>
      </div>
      <button onclick="DetailedController.exportCSV()" class="text-[11px] font-bold text-[#5c6b89] hover:text-[#3a455c] transition-colors border border-[#e5e5e5] bg-white px-3 py-1.5 rounded shadow-sm">
        EXPORT CSV
      </button>
    </div>
    
    <div class="overflow-x-auto">
      <table class="fin-table w-full text-xs" id="detail-dre-table">
        <thead>
          <tr class="border-b border-[#e5e5e5] text-[#8c8c8c] font-semibold uppercase text-[10px]">
            <th class="text-left px-4 py-3 bg-[#fdfdfc] min-w-[200px]">Account Name</th>
            <th class="text-right px-4 py-3 bg-[#fafaf9]">Weight (%)</th>
            <th class="text-right px-4 py-3 bg-[#fafaf9]">Baseline ($)</th>
            <th class="text-right px-4 py-3 bg-[#f4f5f6] text-[#333333]">Simulated ($)</th>
            <th class="text-right px-4 py-3 bg-white">Delta ($)</th>
            <th class="text-right px-4 py-3 bg-white">Var (%)</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-[#f0f0f0] font-mono text-[11px]">
          <!-- Dynamically filled by Controller -->
        </tbody>
      </table>
    </div>
    
    <div class="px-4 py-3 border-t border-[#f0f0f0] bg-[#fafaf9] text-[11px] text-[#8c8c8c] flex justify-between items-center rounded-b-lg">
      <span class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full bg-[#829e84]"></span> Favorable
        <span class="w-2 h-2 rounded-full bg-[#c27c6b] ml-3"></span> Unfavorable
      </span>
      <span class="font-mono tracking-wide">Last calculated: <span id="detail-timestamp">—</span></span>
    </div>
  </div>

</div>

<!-- 3. DETAILED DRE CONTROLLER -->
<script>
  window.DetailedController = (function() {
    
    // Formatting utilities native to this module to prevent global dependency breaks
    const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'decimal', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(val);
    const formatPercent = (val) => new Intl.NumberFormat('en-US', { style: 'percent', minimumFractionDigits: 1, maximumFractionDigits: 1 }).format(val);

    // 3.1 DATA FETCH & MATH ENGINE
    async function fetchDetailedPL(params) {
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            .getDetailedPL(params.scenario_id, params.year, params.pos_id);
        });
      }
      
      // Mock Data Payload (Baseline)
      const baselineData = [
        { id: 1,  name: 'Gross Revenue',          parent_id: null, level: 1, type: 'revenue', amount: 142800000 },
        { id: 2,  name: 'Deductions & Taxes',     parent_id: 1,    level: 2, type: 'expense', amount: -24300000 },
        { id: 3,  name: 'Net Revenue',            parent_id: 1,    level: 1, type: 'revenue', amount: 118500000 },
        { id: 4,  name: 'COGS',                   parent_id: 3,    level: 2, type: 'expense', amount: -65175000 },
        { id: 5,  name: 'Gross Margin',           parent_id: 3,    level: 1, type: 'margin',  amount: 53325000 },
        { id: 6,  name: 'Operating Expenses',     parent_id: 5,    level: 2, type: 'expense', amount: -23107500 },
        { id: 7,  name: 'Selling Expenses',       parent_id: 6,    level: 3, type: 'expense', amount: -14235000 },
        { id: 14, name: 'Trade Marketing',        parent_id: 7,    level: 4, type: 'expense', amount: -9200000 },
        { id: 15, name: 'Commissions',            parent_id: 7,    level: 4, type: 'expense', amount: -5035000 },
        { id: 8,  name: 'G&A (General & Admin)',  parent_id: 6,    level: 3, type: 'expense', amount: -8872500 },
        { id: 11, name: 'Salaries & Benefits',    parent_id: 8,    level: 4, type: 'expense', amount: -5400000 },
        { id: 12, name: 'Facilities & Rent',      parent_id: 8,    level: 4, type: 'expense', amount: -2100000 },
        { id: 13, name: 'IT & Cloud Licenses',    parent_id: 8,    level: 4, type: 'expense', amount: -1372500 },
        { id: 10, name: 'EBITDA',                 parent_id: 5,    level: 1, type: 'margin',  amount: 30217500 }
      ];

      return new Promise(resolve => {
        setTimeout(() => {
          // PROPORTIONAL CASCADING SIMULATOR LOGIC
          // In a real app, this comes from the backend. Here we simulate the engine mathematically.
          let multiplier = { revenue: 1.0, cogs: 1.0, sgna: 1.0 };
          
          if (params.scenario_id === 'scenario_A') {
            // Scenario A logic: +5% Revenue, -12% G&A and Selling Exp
            multiplier = { revenue: 1.05, cogs: 1.05, sgna: 0.88 }; 
          }

          const calculatedData = baselineData.map(row => {
            let simAmount = row.amount;
            
            // Apply levers based on account location in the tree
            if (row.id === 1 || row.id === 2 || row.id === 3) simAmount = row.amount * multiplier.revenue;
            if (row.id === 4) simAmount = row.amount * multiplier.cogs;
            if (row.id >= 6 && row.id <= 15) simAmount = row.amount * multiplier.sgna; // Applies to OpEx and its L3/L4 children
            
            // Calculate margins based on newly cascaded simulated numbers
            if (row.id === 5) simAmount = (baselineData.find(r=>r.id===3).amount * multiplier.revenue) + (baselineData.find(r=>r.id===4).amount * multiplier.cogs);
            if (row.id === 10) simAmount = ((baselineData.find(r=>r.id===3).amount * multiplier.revenue) + (baselineData.find(r=>r.id===4).amount * multiplier.cogs)) + (baselineData.find(r=>r.id===6).amount * multiplier.sgna);

            const delta = simAmount - row.amount;
            const varPercent = row.amount !== 0 ? (delta / Math.abs(row.amount)) : 0;

            return {
              ...row,
              baseline: row.amount,
              simulated: simAmount,
              delta: delta,
              varPercent: varPercent
            };
          });

          resolve(calculatedData);
        }, 150);
      });
    }

    // 3.2 RENDER ENGINE
    function renderTable(data) {
      const tbody = document.querySelector('#detail-dre-table tbody');
      if (!tbody) return;

      // Find Net Revenue to calculate vertical weights (common-size P&L)
      const netRev = Math.abs(data.find(r => r.id === 3)?.baseline || 1);

      tbody.innerHTML = data.map(row => {
        // UI Hierarchy configuration
        const indent = (row.level - 1) * 20;
        let rowClasses = "transition-colors hover:bg-[#fcfcfb]";
        let textClasses = "text-[#595959]";
        
        if (row.level === 1) {
          rowClasses = "bg-[#f4f5f6] border-t border-[#e5e5e5] font-semibold";
          textClasses = "text-[#333333]";
        } else if (row.level === 2) {
          textClasses = "text-[#333333] font-semibold";
        }

        // Weight calculation
        const weight = row.level > 1 ? (Math.abs(row.baseline) / netRev) : null;
        const weightDisplay = weight !== null ? formatPercent(weight) : '—';

        // Variance coloring logic (Corporate Palette)
        // Expense decrease = Favorable (Sage: #829e84) | Expense increase = Unfavorable (Terracotta: #c27c6b)
        // Revenue increase = Favorable | Revenue decrease = Unfavorable
        let isFavorable = false;
        if (row.type === 'expense') isFavorable = row.delta > 0; // Cost reduction (less negative) is mathematically > 0
        else isFavorable = row.delta > 0; // Revenue/Margin increase

        let colorClass = "text-[#8c8c8c]"; // Neutral if 0
        if (row.delta > 0.01) colorClass = isFavorable ? "text-[#829e84] font-bold" : "text-[#c27c6b] font-bold";
        if (row.delta < -0.01) colorClass = isFavorable ? "text-[#829e84] font-bold" : "text-[#c27c6b] font-bold";

        return `
          <tr class="${rowClasses}">
            <td class="px-4 py-2.5 text-left bg-transparent flex items-center font-sans text-xs" style="padding-left: ${indent + 16}px;">
              ${row.level > 2 ? '<span class="text-[#d9d9d9] mr-2">└</span>' : ''}
              <span class="${textClasses}">${row.name}</span>
            </td>
            <td class="px-4 py-2.5 text-right text-[#8c8c8c] bg-transparent text-[10px]">
              ${weightDisplay}
            </td>
            <td class="px-4 py-2.5 text-right ${textClasses} bg-transparent">
              ${formatCurrency(row.baseline)}
            </td>
            <td class="px-4 py-2.5 text-right font-bold text-[#333333] bg-[#fdfdfc]">
              ${formatCurrency(row.simulated)}
            </td>
            <td class="px-4 py-2.5 text-right ${colorClass} bg-transparent">
              ${row.delta > 0 ? '+' : ''}${formatCurrency(row.delta)}
            </td>
            <td class="px-4 py-2.5 text-right ${colorClass} bg-transparent">
              ${row.varPercent > 0 ? '+' : ''}${formatPercent(row.varPercent)}
            </td>
          </tr>`;
      }).join('');

      document.getElementById('detail-timestamp').textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // 3.3 EXPORT UTILITY
    function exportCSV() {
      console.log("Initiating CSV Export... (To be integrated with Sheet JS or native Blob)");
      alert("Executive drill-down exported successfully.");
    }

    // 3.4 PUBLIC ORCHESTRATOR ENDPOINT
    async function loadData() {
      const scenario = document.getElementById('detail-scenario')?.value || 'base';
      const year = document.getElementById('detail-year')?.value || '2026';
      const pos = document.getElementById('detail-pos')?.value || 'ALL';
      
      // Visual loading state
      const tbody = document.querySelector('#detail-dre-table tbody');
      if(tbody) tbody.innerHTML = `<tr><td colspan="6" class="text-center py-8 text-[#8c8c8c] font-sans animate-pulse">Calculating cascading variances...</td></tr>`;

      const data = await fetchDetailedPL({ scenario_id: scenario, year: year, pos_id: pos });
      renderTable(data);
    }

    return { loadData, exportCSV };
  })();

  // Lifecycle bind for the SPA Orchestrator
  document.addEventListener('DOMContentLoaded', () => {
    if (document.getElementById('detailed-view')?.classList.contains('active')) {
      DetailedController.loadData();
    }
  });
</script>
